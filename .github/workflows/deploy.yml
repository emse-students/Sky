name: Deploy to production

on:
  workflow_run:
    workflows: ["CI (Bun)"]
    types:
      - completed
    branches:
      - main

jobs:
  build-image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/emse-students/sky
          tags: |
            type=raw,value=latest
            type=sha,prefix=main-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    runs-on: self-hosted
    needs: build-image
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_DIR: /home/mitv/Sky
      COMPOSE: docker compose -f /home/mitv/Sky/docker-compose.prod.yml --project-directory /home/mitv/Sky
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Generate .env from secrets
        env:
          MICONNECT_CLIENT_ID: ${{ secrets.MICONNECT_CLIENT_ID }}
          MICONNECT_CLIENT_SECRET: ${{ secrets.MICONNECT_CLIENT_SECRET }}
          MICONNECT_BASE_URL: ${{ secrets.MICONNECT_BASE_URL }}
          SKY_ADMIN_SUBS: ${{ secrets.SKY_ADMIN_SUBS }}
          MIGALLERY_API_KEY: ${{ secrets.MIGALLERY_API_KEY }}
          MIGALLERY_API_URL: ${{ secrets.MIGALLERY_API_URL }}
          CANARI_API_KEY: ${{ secrets.CANARI_API_KEY }}
          CANARI_API_URL: ${{ secrets.CANARI_API_URL }}
          SKY_API_KEY: ${{ secrets.SKY_API_KEY }}
        run: |
          for v in MICONNECT_CLIENT_ID MICONNECT_CLIENT_SECRET MIGALLERY_API_KEY; do
            if [ -z "${!v}" ]; then echo "::error::Secret GitHub manquant: $v"; exit 1; fi
          done
          mkdir -p "$DEPLOY_DIR"
          umask 077
          {
            printf 'MICONNECT_CLIENT_ID=%s\n' "$MICONNECT_CLIENT_ID"
            printf 'MICONNECT_CLIENT_SECRET=%s\n' "$MICONNECT_CLIENT_SECRET"
            printf 'MIGALLERY_API_KEY=%s\n' "$MIGALLERY_API_KEY"
            if [ -n "$MICONNECT_BASE_URL" ]; then printf 'MICONNECT_BASE_URL=%s\n' "$MICONNECT_BASE_URL"; fi
            if [ -n "$SKY_ADMIN_SUBS" ]; then printf 'SKY_ADMIN_SUBS=%s\n' "$SKY_ADMIN_SUBS"; fi
            if [ -n "$MIGALLERY_API_URL" ]; then printf 'MIGALLERY_API_URL=%s\n' "$MIGALLERY_API_URL"; fi
            if [ -n "$CANARI_API_KEY" ]; then printf 'CANARI_API_KEY=%s\n' "$CANARI_API_KEY"; fi
            if [ -n "$CANARI_API_URL" ]; then printf 'CANARI_API_URL=%s\n' "$CANARI_API_URL"; fi
            if [ -n "$SKY_API_KEY" ]; then printf 'SKY_API_KEY=%s\n' "$SKY_API_KEY"; fi
          } > "$DEPLOY_DIR/.env"

      - name: Sync deploy files
        run: |
          cp docker-compose.prod.yml "$DEPLOY_DIR/"
          mkdir -p "$DEPLOY_DIR/scripts"
          cp scripts/backup-offsite.sh scripts/restore-offsite.sh "$DEPLOY_DIR/scripts/"
          chmod +x "$DEPLOY_DIR/scripts/backup-offsite.sh" "$DEPLOY_DIR/scripts/restore-offsite.sh"

      - name: Pull image
        run: $COMPOSE pull

      - name: Stop legacy pm2 process (cutover idempotent)
        run: |
          /home/mitv/.bun/bin/pm2 delete sky 2>/dev/null || true
          /home/mitv/.bun/bin/pm2 save --force 2>/dev/null || true

      - name: Deploy
        run: $COMPOSE up -d --remove-orphans

      - name: Health check
        run: |
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3001/api/health || true)
            if [ "$code" = "200" ]; then echo "✅ Sky healthy"; exit 0; fi
            sleep 3
          done
          echo "::error::Health check KO apres deploiement"
          $COMPOSE logs --tail 50
          exit 1

      - name: Cleanup Docker
        run: |
          docker image prune -af --filter 'until=24h' || true
          docker builder prune -af --filter 'until=168h' || true
