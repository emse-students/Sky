# Stack de production Sky.
# La CD build et pousse l image sur GHCR, puis fait `docker compose pull && up -d`
# sur le serveur. Le .env (secrets) est genere par la CD depuis les secrets GitHub.
#
# database/ est monte depuis le dossier de deploiement pour conserver la base
# SQLite existante (sky.db, qui contient desormais identites et sessions) entre
# les versions.
services:
  sky:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/sky}:${TAG:-latest}
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SKY_HOST_PORT:-3001}:3001"
    environment:
      PORT: "3001"
      NODE_ENV: production
      # SSO Authentik (miconnect). Base non secrete (defaut ci-dessous) ; les
      # endpoints sont a /application/o/<endpoint>/ (globaux, sans slug, comme Canari).
      MICONNECT_BASE_URL: ${MICONNECT_BASE_URL:-https://auth.canari-emse.fr}
      MICONNECT_CLIENT_ID: ${MICONNECT_CLIENT_ID:?MICONNECT_CLIENT_ID requis}
      MICONNECT_CLIENT_SECRET: ${MICONNECT_CLIENT_SECRET:?MICONNECT_CLIENT_SECRET requis}
      # Liste de sub Authentik admins (separes par des virgules), facultative.
      SKY_ADMIN_SUBS: ${SKY_ADMIN_SUBS:-}
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-10485760}
      MIGALLERY_API_KEY: ${MIGALLERY_API_KEY:?MIGALLERY_API_KEY requis}
      MIGALLERY_API_URL: ${MIGALLERY_API_URL:-https://gallery.mitv.fr}
      # API profil public de Canari (bio, associations). La cle doit etre identique
      # a EXTERNAL_API_KEY cote Canari. Vide = pas d enrichissement Canari.
      CANARI_API_URL: ${CANARI_API_URL:-https://canari-emse.fr}
      CANARI_API_KEY: ${CANARI_API_KEY:-}
      # Cle de l API publique entrante (Canari lit l arbre de parrainage). Doit
      # etre identique a SKY_API_KEY cote Canari. Vide = endpoint refuse.
      SKY_API_KEY: ${SKY_API_KEY:-}
    volumes:
      - ./database:/app/database
